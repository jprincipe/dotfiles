gui:
  # Nordfox colorscheme
  theme:
    # Default text color - nordfox fg
    defaultFgColor:
      - "#cdcecf"
    # Selected line background - nordfox sel0
    selectedLineBgColor:
      - "#3e4a5b"
    # Selected range background - nordfox sel1
    selectedRangeBgColor:
      - "#4f6074"
    # Cherry picked commit
    cherryPickedCommitFgColor:
      - "#81a1c1"
    cherryPickedCommitBgColor:
      - "#2e3440"
    # Untracked/unstaged file color - nordfox red
    unstagedChangesColor:
      - "#bf616a"
    # Options/info text - nordfox blue
    optionsTextColor:
      - "#81a1c1"
    # Search highlighting - nordfox yellow
    searchingActiveBorderColor:
      - "#ebcb8b"
    # Active border - nordfox cyan
    activeBorderColor:
      - "#88c0d0"
    # Inactive border - nordfox bg3
    inactiveBorderColor:
      - "#444c5e"
