# ── General ────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-ghostty:RGB,*256col*:RGB"
set -ag terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -ag terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'
set -g escape-time 0
set -g focus-events on
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -g allow-passthrough on
set -g extended-keys on
set -g history-limit 50000

# ── Prefix ────────────────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── Vi mode ───────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi i send -X cancel
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"


# ── Smart pane navigation (Ctrl+hjkl) ────────────────────
# Detects vim/nvim and forwards keys, otherwise does tmux pane switch
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# ── Smart C-y: forward to nvim, otherwise enter copy-mode ─
bind-key -n C-y if-shell "$is_vim" "send-keys C-y" "copy-mode"

# ── Window navigation (Ctrl+Shift+H/L) ───────────────────
bind-key -n C-S-h previous-window
bind-key -n C-S-l next-window
# Alt fallback if Ctrl+Shift isn't passed through
bind-key -n M-h previous-window
bind-key -n M-l next-window

# ── Session navigation (Ctrl+,/.) ─────────────────────────
bind-key -n C-, switch-client -p
bind-key -n C-. switch-client -n

# ── Session picker (sesh) ─────────────────────────────────
bind-key -n M-s display-popup -E -w 60% -h 60% "~/.config/tmux/scripts/sesh-picker.sh"
bind-key s      display-popup -E -w 60% -h 60% "~/.config/tmux/scripts/sesh-picker.sh"
bind-key -n M-o run-shell "sesh last"

# ── Jump to window by number (Alt+1-9) ───────────────────
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9


# ── Pane resizing (prefix + Arrow, repeatable) ───────────
bind -r Up    resize-pane -U 5
bind -r Down  resize-pane -D 5
bind -r Left  resize-pane -L 5
bind -r Right resize-pane -R 5

# ── Pane splitting ────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ── New window inherits path ──────────────────────────────
bind c new-window -c "#{pane_current_path}"

# ── Nordic Theme ──────────────────────────────────────────
# Colors from Ghostty nordic theme
# nord0: #2E3440  nord1: #3B4252  nord3: #4C566A  nord4: #D8DEE9
# nord7: #8FBCBB  nord8: #88C0D0  nord9: #81A1C1  nord10: #5E81AC

# Status bar
set -g status-position top
set -g status-style "bg=#2E3440,fg=#D8DEE9"
set -g status-left "#[bg=#2E3440]#[fg=#4C566A]#[bg=#4C566A]#[fg=#{?#{==:#{@focused},0},#BF616A,#A3BE8C}]#[bold]●#[fg=#88C0D0]#[bold] #{session_name} #[bg=#2E3440]#[fg=#4C566A] "
set -g status-left-length 40
set -g status-right "#{tmux_mode_indicator} #[bg=#2E3440]#[fg=#4C566A]#[bg=#4C566A]#[fg=#D8DEE9] #{battery_icon} #{battery_percentage} #[bg=#2E3440]#[fg=#4C566A] #[bg=#2E3440]#[fg=#4C566A]#[bg=#4C566A]#[fg=#D8DEE9] %H:%M #[bg=#2E3440]#[fg=#4C566A]"
set -g status-right-length 100
set -g status-justify left

# Terminal window focus state (flipped by client-focus-in/out hooks)
set -g @focused "1"
set-hook -g client-focus-in  'set -g @focused "1"; set -g status-style "bg=#2E3440,fg=#D8DEE9"'
set-hook -g client-focus-out 'set -g @focused "0"; set -g status-style "bg=#2E3440,fg=#4C566A"'

# Window tabs
setw -g window-status-format "#[fg=#4C566A] #I #W "
setw -g window-status-current-format "#[bg=#2E3440]#[fg=#88C0D0]#[bg=#88C0D0]#[fg=#2E3440]#[bold] #I #W #[bg=#2E3440]#[fg=#88C0D0]#[nobold]"
setw -g window-status-separator " "

# Pane borders
set -g pane-border-style "fg=#3B4252"
set -g pane-active-border-style "fg=#81A1C1"
set -g pane-border-lines double
set -g pane-border-status off
set -g pane-border-format " #{b:pane_current_path} "
bind b set -w pane-border-status #{?#{==:#{pane-border-status},off},top,off}

# Messages & command line
set -g message-style "bg=#2E3440,fg=#D8DEE9"
set -g message-command-style "bg=#2E3440,fg=#D8DEE9"

# Mode (copy mode highlight)
setw -g mode-style "bg=#81A1C1,fg=#2E3440"

# Clock
setw -g clock-mode-colour "#81A1C1"

# Transparent pane backgrounds (pass through to Ghostty)
set -g window-style "bg=default"
set -g window-active-style "bg=default"

# ── Plugins (TPM) ────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'MunifTanjim/tmux-mode-indicator'

# tmux-mode-indicator — Nordic palette, pre-shaped as pills
# Commas inside #[...] would break the surrounding #{?...} conditional, so split.
set -g @mode_indicator_empty_prompt  '#[bg=#2E3440]#[fg=#4C566A]#[bg=#4C566A]#[fg=#D8DEE9] TMUX #[bg=#2E3440]#[fg=#4C566A]'
set -g @mode_indicator_prefix_prompt '#[bg=#2E3440]#[fg=#88C0D0]#[bg=#88C0D0]#[fg=#2E3440]#[bold] WAIT #[bg=#2E3440]#[fg=#88C0D0]#[nobold]'
set -g @mode_indicator_copy_prompt   '#[bg=#2E3440]#[fg=#EBCB8B]#[bg=#EBCB8B]#[fg=#2E3440]#[bold] COPY #[bg=#2E3440]#[fg=#EBCB8B]#[nobold]'
set -g @mode_indicator_sync_prompt   '#[bg=#2E3440]#[fg=#BF616A]#[bg=#BF616A]#[fg=#2E3440]#[bold] SYNC #[bg=#2E3440]#[fg=#BF616A]#[nobold]'
set -g @mode_indicator_empty_mode_style  'default'
set -g @mode_indicator_prefix_mode_style 'default'
set -g @mode_indicator_copy_mode_style   'default'
set -g @mode_indicator_sync_mode_style   'default'

# Initialize TPM (must be last line)
run '~/.config/tmux/plugins/tpm/tpm'
