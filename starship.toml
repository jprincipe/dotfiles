# version: 1.0.0

add_newline = true
command_timeout = 200
format = "$directory$git_branch$time$character"
# right_format = "$time"

[time]
disabled = false
format = "[$time]($style) "
time_format = "%R"
utc_time_offset = "local"
style = "bold #ADC9BC"

[character]
error_symbol = "[‚úó](bold #F57F82)"
success_symbol = "[‚ùØ](bold #CBE3B3)[‚ùØ](bold #B3E3CA)[‚ùØ](bold #B3E6DB)"

[directory]
truncation_length = 2
truncation_symbol = "‚Ä¶/"
style = "#B2CAED"
repo_root_style = "bold #B3E3CA"
repo_root_format = "[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "

[git_branch]
format = "[$branch]($style) "
style = "bold #CBE3B3"

